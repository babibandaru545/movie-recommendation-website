<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:black;
            color:white;
        }

        .signup-box{
            width:400px;
            margin:auto;
            margin-top:80px;
            background:#1c1c1c;
            padding:30px;
            border-radius:10px;
        }

    </style>

</head>

<body>

<div class="signup-box">

    <h2 class="text-center mb-4">
        👤 Signup
    </h2>

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success w-100">
            Create Account
        </button>

    </form>

</div>

</body>
</html>
